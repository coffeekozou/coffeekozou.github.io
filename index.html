<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>こぞうの投資LAB</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 🎨 設定パレット */
        :root {
            --hero-height: 350px;
            /* 色 */
            --bg-investment: #f6f5ee; 
            --bg-collection: #dee2e2; 
            --text-color: #5d4037;
            --accent-color: #d35400;
        }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            margin: 0; padding: 0;
            color: var(--text-color);
            background-color: var(--bg-investment);
        }

        /* ヘッダー */
        header {
            background-color: #fff;
            padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .logo { font-size: 1.4rem; font-weight: bold; text-decoration: none; color: var(--text-color); display: flex; align-items: center; gap: 8px; }
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: #888; font-weight: bold; transition: 0.3s; }
        nav a:hover { color: var(--accent-color); }

        @media (max-width: 600px) {
            header { flex-direction: column; gap: 15px; padding: 15px 15px; }
            nav ul { width: 100%; justify-content: space-between; font-size: 0.9rem; }
        }

        /* メインビジュアル */
        .hero {
            height: var(--hero-height);
            background-color: #2c2c2c;
            background-image: url('hero-bg.jpg'); /* ここ！ */
            background-size: cover;               /* 隙間なく埋める */
            background-position: center;          /* 真ん中合わせ */
            display: flex; flex-direction: column; justify-content: center;
            align-items: flex-start; text-align: left;
            padding-left: 10%; padding-right: 20px; color: #fff;
        }
        .hero h1 { font-size: 2.2rem; margin: 0 0 15px 0; letter-spacing: 0.05em; }
        .hero p { font-size: 1rem; color: #ccc; line-height: 1.8; margin: 0; }

        /* --- 共通セクション設定 --- */
        section { padding: 60px 20px; text-align: center; }

        /* ★タイトルのデザイン */
        h2 {
            font-size: 1.8rem; 
            margin-bottom: 20px; /* コメントとの距離 */
            border-bottom: 3px dashed rgba(93, 64, 55, 0.2); 
            /* 文字の幅 */
            display: inline-block; 
            padding-bottom: 10px;
        }

        /* 1階：投資エリア */
        #investment-floor { background-color: var(--bg-investment); }

        .chart-wrapper { position: relative; width: 300px; height: 300px; margin: 0 auto 20px; }
        .chart-center-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        .chart-label { font-size: 0.9rem; color: #777; font-weight: bold; margin-bottom: 5px; }
        .chart-value { font-size: 2.2rem; font-weight: bold; color: var(--accent-color); line-height: 1; }

        .custom-legend {
            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;
            margin-bottom: 40px; font-size: 0.9rem; color: #5d4037;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-color { width: 12px; height: 12px; border-radius: 50%; }

        .btn {
            background-color: #fff; color: #555; padding: 12px 40px;
            border-radius: 8px; border: 2px solid #ddd;
            text-decoration: none; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.3s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn:hover { transform: translateY(-2px); border-color: var(--accent-color); color: var(--accent-color); }

        /* 2階：コレクションエリア */
        #collection-floor { background-color: var(--bg-collection); }
        /* 「border: none」の記述を削除 */
        
        .sub-text { 
            color: #666; font-size: 0.9rem; margin-bottom: 40px; 
            margin-top: 5px; /* 点線との隙間 */
        }

        footer { text-align: center; padding: 30px; background: #fff; color: #aaa; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo">☕ こぞうの投資LAB</a>
        <nav>
            <ul>
                <li><a href="#investment-floor">ホーム</a></li>
                <li><a href="#investment-floor">PFグラフ</a></li>
                <li><a href="#">金・Gold</a></li>
                <li><a href="https://ameblo.jp/furuicamera" target="_blank">ブログ ➡</a></li>
            </ul>
        </nav>
    </header>

    <div class="hero">
        <h1>投資実験室へようこそ</h1>
        <p>投資初心者こぞうの資産管理ページです。<br></p>
    </div>

    <section id="investment-floor">
        <h2>Investment Portfolio</h2>
        <div class="sub-text">テスト</div>
    
        
        <div class="chart-wrapper">
            <canvas id="myPieChart"></canvas>
            <div class="chart-center-text">
                <div class="chart-label">目標達成率</div>
                <div class="chart-value">75.0%</div>
            </div>
        </div>

        <div class="custom-legend">
            <div class="legend-item"><span class="legend-color" style="background:#ef9a9a;"></span>日本株</div>
            <div class="legend-item"><span class="legend-color" style="background:#b39ddb;"></span>米国株</div>
            <div class="legend-item"><span class="legend-color" style="background:#ffccbc;"></span>投資信託</div>
            <div class="legend-item"><span class="legend-color" style="background:#d1c4e9;"></span>現金・他</div>
        </div>
        
        <p style="font-size: 0.9rem; color: #999; margin-bottom: 30px;">(最終更新: 2026/02/02)</p>

        <a href="https://ameblo.jp/furuicamera" target="_blank" class="btn">投資ブログを読む ✏️</a>
    </section>

    <section id="collection-floor">
        <h2>NANAIRO MARBLE（改修中）</h2>
        <div class="sub-text">Old but Gold. 私の愛すべきガラクタたち。</div>
        
        <div style="font-size: 3.5rem; margin: 30px;">🧸 🐸 💊</div>

        <a href="collection/index.html" class="btn">コレクションの部屋へ ➡</a>
    </section>

    <footer>
        &copy; 2026 Kozou's Investment Lab.
    </footer>

    <script>
        const ctx = document.getElementById('myPieChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['日本株', '米国株', '投資信託', '現金・他'],
                datasets: [{
                    data: [50, 30, 20, 10], 
                    backgroundColor: ['#ef9a9a', '#b39ddb', '#ffccbc', '#d1c4e9'], 
                    borderWidth: 2,
                    borderColor: '#fff0f5',
                    hoverOffset: 4
                }]
            },
            options: {
                cutout: '70%',
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: false }
                },
                maintainAspectRatio: false
            }
        });
    </script>
</body>
</html>
