<!DOCTYPE html>
<html lang="ja">

<head>

    <script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サトちゃん - なないろまーぶる | こぞうの投資LAB</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #f2ede4;
        }

        .tag {
            background-color: #8d6e63;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .memo {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #888;
            border-top: 1px dotted #ccc;
            padding-top: 5px;
        }

        /* --- 案1修正：画像サイズと切り替えエリア --- */
        .image-gallery {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
            align-items: center;
            /* 中央寄せ */
        }

        .main-image {
            width: 100%;
            max-width: 250px;
            /* メイン画像を少し小さく制限 */
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
        }

        .main-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* 画像全体が収まるように */
        }

        .sub-images {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .sub-images img {
            width: 60px;
            /* サムネイルをさらに少し小さく */
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .sub-images img:hover {
            border-color: #8d6e63;
            /* 選択したときに色が変わる */
        }

        /* ------------------------------------- */

        .card-header h2 {
            font-size: 1.1rem;
            margin: 0;
            font-weight: 700;
            color: #5d4037;
        }
    </style>
</head>

<body>
    <header>
        <a href="../index.html" class="logo">☕ こぞうの投資LAB</a>
        <nav>
            <ul>
                <li><a href="../index.html">ホーム</a></li>
                <li><a href="index.html">コレクションTOP</a></li>
                <li><a href="https://ameblo.jp/furuicamera" target="_blank">ブログ ➡</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 class="page-title">サトちゃん コレクション</h1>
            <p class="sub-text">Old but Gold. 薬局の店頭を彩ったマスコットたち。</p>
        </div>

        <div class="stock-grid">

            <div class="stock-card">
                <div class="card-header">
                    <h2>サトちゃんSA-8型</h2>
                    <span class="tag">置物</span>
                </div>
                <div class="card-body">
                    <div class="image-gallery">
                        <div class="main-image">
                            <img src="images/sato_01_front.jpg" alt="正面" id="main-01">
                        </div>
                        <div class="sub-images">
                            <img src="images/sato_01_front.jpg" alt="正面"
                                onclick="document.getElementById('main-01').src=this.src">
                            <img src="images/sato_01_back.jpg" alt="背面"
                                onclick="document.getElementById('main-01').src=this.src">
                            <img src="images/sato_01_side.jpg" alt="側面"
                                onclick="document.getElementById('main-01').src=this.src">
                        </div>
                    </div>
                    <p>昭和36年以降に活躍していたモデル。手塗りの眉毛が良い味です。</p>
                    <div class="memo">入手：2001年</div>
                </div>
            </div>

            <div class="stock-card">
                <div class="card-header">
                    <h2>ランドセルサトちゃん</h2>
                    <span class="tag">貯金箱</span>
                </div>
                <div class="card-body">
                    <div class="image-gallery">
                        <div class="main-image">
                            <img src="images/sato_02_front.jpg" alt="正面" id="main-02">
                        </div>
                                                <div class="sub-images">
                            <img src="images/sato_01_front.jpg" alt="正面"
                                onclick="document.getElementById('main-02').src=this.src">
                            <img src="images/sato_02_back.jpg" alt="背面"
                                onclick="document.getElementById('main-02').src=this.src">
                            <img src="images/sato_02_up.jpg" alt="アップ"
                                onclick="document.getElementById('main-02').src=this.src">
                        </div>

                    </div>
                    <p>眉毛の個体差が激しいモデル。靴の裏に刻印があります。</p>
                    <div class="memo">入手：2002年</div>
                </div>
            </div>

        </div>

        <div style="margin-top: 50px; text-align: center;">
            <a href="index.html" class="btn">コレクション一覧へ戻る</a>
        </div>
    </main>

    <footer style="margin-top: 80px; padding: 40px 20px;">
        <p style="font-size: 0.8rem; letter-spacing: 0.05em; color: #aaa;">
            &copy; 2026 Kozou's Investment Lab. — なないろまーぶる Since 2008
        </p>

    </footer>
</body>

</html>
